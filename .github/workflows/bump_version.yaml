name: Bump Current Version

# Automatically bump the pyproject.toml and corresponding uv.lock file's minor
# version when a PR is created for src changes.
on:
  workflow_dispatch:

  pull_request:
    types: [ opened ]
    paths: [ src/** ]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump_version:
    name: Bump pyproject.toml Version

    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    env:
      BRANCH: ${{ github.head_ref || github.ref }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.BRANCH }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba

        # If no tags exist use the existing version - otherwise bump minor
      - name: Bump Version
        id: bump
        run: |
          echo "Existing Tags..."
          git tag --list

          version="v$(uv version --short)"
          echo "Current version: $version"

          if [[ -n $(git tag --list $version) ]]; then
            uv version --bump minor
            bumped=true
          else
            echo "Skipping: $version not in tags."
            bumped=false
          fi

          echo "bumped=$bumped" >> $GITHUB_OUTPUT

      - name: Commit and Push
        if: steps.bump.outputs.bumped
        uses: iarekylew00t/verified-bot-commit@69a9979a7952792313012eadcbdd6b56f17154f6
        with:
          ref: ${{ env.BRANCH }}
          files: |
            **
          message: "Workflow Bot 🤖: Version Bump"
